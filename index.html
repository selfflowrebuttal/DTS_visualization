<head>
<style>
  body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 20px; line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; }
  h2 { text-align: center; color: #a0c4ff; margin-bottom: 5px; }

  .card { background: #16213e; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #252d4a; width: 280px; }
  canvas { border-radius: 6px; background: #000; width: 100%; height: auto; display: block; }
  
  .label { margin-top: 10px; font-size: 15px; color: #a0c4ff; font-weight: bold; }
  .label i { font-family: serif; font-weight: normal; }
  .sublabel { font-size: 11px; color: #999; margin-top: 4px; }
  
  input[type=range] { vertical-align: middle; cursor: pointer; }
  span.val { color: #fff; font-weight: bold; margin-right: 20px; }
</style>

  imgEl.onload = () => render();
  imgEl.src = b64;

  const updateUI = (id, val, suffix='') => {
    document.getElementById(id).textContent = val + suffix;
    render();
  };

  document.getElementById('patchSize').oninput = (e) => updateUI('patchVal', e.target.value, 'px');
  document.getElementById('noiseLevel').oninput = (e) => updateUI('noiseVal', parseFloat(e.target.value).toFixed(2));

  function createCard(title, subtext, canvas) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="label">${title}</div><div class="sublabel">${subtext}</div>`;
    card.prepend(canvas);
    return card;
  }

  function render() {
    const topRow = document.getElementById('top-row');
    const bottomRow = document.getElementById('bottom-row');
    
    // Clear rows but keep labels
    [topRow, bottomRow].forEach(row => {
      const label = row.querySelector('.row-label');
      row.innerHTML = '';
      row.appendChild(label);
    });

    const patchSize = parseInt(document.getElementById('patchSize').value);
    const noiseLevel = parseFloat(document.getElementById('noiseLevel').value);
    const W = 256, H = Math.round(imgEl.height * (256 / imgEl.width));

    // Shared Offscreen Canvas for source data
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const octx = off.getContext('2d');
    octx.drawImage(imgEl, 0, 0, W, H);
    const srcData = octx.getImageData(0, 0, W, H);

    // Helper: Generate noisy data
    const getNoisyData = (amt) => {
      const d = new Uint8ClampedArray(srcData.data);
      for (let i = 0; i < d.length; i += 4) {
        const n = (Math.random() - 0.5) * 255 * amt * 2;
        d[i] = Math.min(255, Math.max(0, d[i] * (1-amt) + 128*amt + n));
        d[i+1] = Math.min(255, Math.max(0, d[i+1] * (1-amt) + 128*amt + n));
        d[i+2] = Math.min(255, Math.max(0, d[i+2] * (1-amt) + 128*amt + n));
      }
      return new ImageData(d, W, H);
    };

    const noisyData = getNoisyData(noiseLevel);

    // 1. Render Top Row (Original)
    const refCanvas = document.createElement('canvas');
    refCanvas.width = W; refCanvas.height = H;
    refCanvas.getContext('2d').putImageData(srcData, 0, 0);
    topRow.appendChild(createCard('Original (<i>x</i>₀)', 'Clean data reference', refCanvas));

    // 2. Render Bottom Row (0.5, 0.25, 0.1)
    const configs = [
      { rm: 0.5,  label: '<i>R<sub>M</sub></i> = 0.5', sub: '50% context tokens (<i>s</i>)' },
      { rm: 0.25, label: '<i>R<sub>M</sub></i> = 0.25', sub: '25% context tokens (<i>s</i>)' },
      { rm: 0.1,  label: '<i>R<sub>M</sub></i> = 0.1', sub: '10% context tokens (<i>s</i>)' }
    ];

    configs.forEach(cfg => {
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.putImageData(noisyData, 0, 0);

      for(let r=0; r<Math.ceil(H/patchSize); r++) {
        for(let c=0; c<Math.ceil(W/patchSize); c++) {
          if(Math.random() < cfg.rm) {
            const x=c*patchSize, y=r*patchSize;
            const pw=Math.min(patchSize, W-x), ph=Math.min(patchSize, H-y);
            ctx.putImageData(octx.getImageData(x,y,pw,ph), x, y);
            ctx.strokeStyle = 'rgba(100,255,100,0.4)';
            ctx.strokeRect(x+0.5, y+0.5, pw-1, ph-1);
          }
        }
      }
      bottomRow.appendChild(createCard(cfg.label, cfg.sub, canvas));
    });
  }
